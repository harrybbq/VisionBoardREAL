[build]
  command   = "npm run build"
  publish   = "dist"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"

[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

[[headers]]
  for = "/api/*"
  [headers.values]
    Access-Control-Allow-Origin  = "*"
    Access-Control-Allow-Headers = "Content-Type"

# ── Scheduled Functions ──────────────────────────────────────────────
# push-dispatch sweeps the notifications_queue every minute. Cheap —
# the function returns immediately when the queue is empty.
[functions."push-dispatch"]
  schedule = "* * * * *"
